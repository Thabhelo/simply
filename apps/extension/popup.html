<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simply</title>
    <script type="module" src="/src/popup.ts"></script>
  </head>
  <body>
    <main>
      <p class="eyebrow">Simply</p>
      <h1>Explain this paper</h1>
      <p class="hint">
        Open an arXiv paper, select a dense paragraph if needed, then generate a study guide.
      </p>
      <div id="auth-row">
        <span id="auth-status">Not signed in</span>
        <button id="signin" type="button">Sign in</button>
        <button id="signout" type="button" hidden>Sign out</button>
      </div>
      <button id="analyze" type="button">Analyze current page</button>
      <button id="download" type="button">Download guide PDF</button>
      <section id="status" role="status">Waiting for a paper.</section>
      <section id="results"></section>
    </main>
  </body>
</html>
