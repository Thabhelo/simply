<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simply contact</title>
</head>
<body style="margin:0;padding:0;background-color:#f3ebe3;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;color:#3d2e24;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3ebe3;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#fffaf5;border:1px solid #dccfc2;border-radius:14px;overflow:hidden;">
          <!-- header -->
          <tr>
            <td style="padding:28px 28px 0;">
              <p style="margin:0 0 6px;font-family:Georgia,'Times New Roman',serif;font-size:30px;font-weight:400;letter-spacing:-0.04em;line-height:1;color:#3d2e24;">simply</p>
              <div style="height:3px;width:42px;background-color:#c4511d;border-radius:2px;margin:0 0 22px;"></div>
              <p style="margin:0 0 20px;display:inline-block;padding:6px 14px;background-color:#faefe4;border:1px solid #e8a882;border-radius:999px;font-size:13px;line-height:1.4;color:#7a6b5c;">{{topic}}</p>
            </td>
          </tr>
          <!-- meta -->
          <tr>
            <td style="padding:0 28px 8px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="font-size:14px;line-height:1.5;">
                <tr>
                  <td style="padding:0 0 8px;color:#7a6b5c;">
                    <span style="color:#3d2e24;font-weight:600;">From</span>
                    &nbsp;{{from_name}}
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 0 20px;color:#7a6b5c;">
                    <span style="color:#3d2e24;font-weight:600;">Email</span>
                    &nbsp;<a href="mailto:{{reply_to}}" style="color:#3d6a8c;text-decoration:none;">{{reply_to}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- message -->
          <tr>
            <td style="padding:0 28px 28px;">
              <div style="background-color:#f3ebe3;border:1px solid #dccfc2;border-radius:10px;padding:18px 20px;font-size:15px;line-height:1.65;color:#3d2e24;white-space:pre-wrap;word-break:break-word;">{{message}}</div>
            </td>
          </tr>
          <!-- footer -->
          <tr>
            <td style="padding:20px 28px 26px;border-top:1px solid #dccfc2;background-color:#f7f0e6;">
              <p style="margin:0;font-size:13px;line-height:1.6;color:#7a6b5c;">
                <span style="color:#3d2e24;font-weight:600;">Simply</span>
                &nbsp;·&nbsp;
                <a href="mailto:admin@usesimply.us" style="color:#3d6a8c;text-decoration:none;">admin@usesimply.us</a>
                &nbsp;·&nbsp;
                <a href="https://usesimply.us" style="color:#3d6a8c;text-decoration:none;">usesimply.us</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
